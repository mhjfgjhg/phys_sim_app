name: PhysCoreBindings
description: 'FFI bindings for phys_core C library'
output: 'lib/src/generated/phys_core_bindings.dart'

headers:
  entry-points:
    - '../phys_core/include/phys_ffi.h'

compiler-opts:
  - '-I../phys_core/include'

# Явно генерируем функции и структуры
functions:
  include:
    - 'step_pendulum'

structs:
  include:
    - 'PendulumState'
    - 'PendulumParams'